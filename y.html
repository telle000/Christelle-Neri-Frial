<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Y - Yoyo</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment Zone</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #e1f5fe; /* Light blue background to evoke fun and play */
      color: #333;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    /* Header Styling */
    header {
      background-color: #0288d1; /* Bold blue for the header */
      padding: 2.5em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 3.5em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    nav a {
      font-size: 1.5em;
      color: white;
      text-decoration: none;
      background-color: #ffeb3b; /* Bright yellow button for contrast */
      padding: 10px 20px;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #fbc02d; /* Darker yellow on hover */
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      width: 80%;
      max-width: 700px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      background-color: #fffde7; /* Soft yellow to match the playful theme */
      text-align: center;
      border: 5px solid #ff5722; /* Orange border for excitement */
    }

    .learning-content h2 {
      font-size: 3.5em;
      color: #0288d1;
      margin-bottom: 20px;
    }

    .learning-content p {
      font-size: 1.5em;
      margin: 10px 0;
      line-height: 1.6;
      color: #0288d1;
    }

    .learning-content strong {
      font-size: 1.8em;
      color: #ff5722; /* Bright orange for emphasis */
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 10px;
      border: 3px solid #0288d1;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }

    .learning-content img:hover {
      transform: scale(1.1);
    }

    /* Footer Styling */
    footer {
      background-color: #0288d1;
      color: white;
      text-align: center;
      padding: 1.5em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 3.2em;
      }

      .learning-content h2 {
        font-size: 2.5em;
      }

      .learning-content p {
        font-size: 1.3em;
      }
    }

  </style>
  <main>
    <section class="learning-content">
      <h2>Letter Y</h2>
      <p>The word for Y is: <strong>Yoyo</strong></p>
      <img src="yoyo.webp" alt="Yoyo" width="200" height="200">
      <p><strong>Dice</strong> is spelled as Y-O-Y-O.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
