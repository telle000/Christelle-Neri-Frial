<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter J - Jackfruit</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Comic Sans MS', sans-serif;
      background-color: #f1f8e9; /* Light green background */
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
      text-align: center;
      padding: 0 20px;
    }

    /* Header Styling */
    header {
      background-color: #80e27e; /* Tropical green */
      padding: 3em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 4em;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    nav a {
      font-size: 1.4em;
      color: white;
      text-decoration: none;
      background-color: #f9a825; /* Yellow-orange background */
      padding: 12px 24px;
      border-radius: 12px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #f57f17; /* Darker yellow-orange on hover */
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 0;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      width: 80%;
      max-width: 650px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      background-image: url('https://www.transparenttextures.com/patterns/wood.png'); /* Wood texture */
      background-size: cover;
      border: 5px solid #80e27e; /* Tropical green border */
    }

    .learning-content h2 {
      font-size: 3.5em;
      color: #2e7d32; /* Dark green */
      margin-bottom: 20px;
    }

    .learning-content p {
      font-size: 1.5em;
      margin: 10px 0;
      line-height: 1.6;
      color: #555;
    }

    .learning-content strong {
      font-size: 1.6em;
      color: #2e7d32; /* Dark green */
    }

    /* Jackfruit Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 15px;
      border: 4px solid #80e27e; /* Tropical green border */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }

    .learning-content img:hover {
      transform: scale(1.1);
    }

    /* Footer Styling */
    footer {
      background-color: #80e27e; /* Tropical green */
      color: white;
      text-align: center;
      padding: 1.5em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 2.8em;
      }

      .learning-content h2 {
        font-size: 2.5em;
      }

      .learning-content p {
        font-size: 1.2em;
      }
    }
  </style>
  <main>
    <section class="learning-content">
      <h2>Letter J</h2>
      <p>The word for J is: <strong>Jackfruit</strong></p>
      <img src="images/dice.webp" alt="Dice" width="200" height="200">
      <p><strong>Jackfruit</strong> is spelled as J-A-C-K-F-R-U-I-T.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
