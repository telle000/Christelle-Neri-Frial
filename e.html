<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter E - Elephant</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>

  <main>
    <section class="learning-content">
      <h2>Letter E</h2>
      <p>The word for E is: <strong>Elephant</strong></p>
      <img src="images/elephant.webp" alt="Elephant" width="200" height="200">
      <p><strong>Elephant</strong> is spelled as E-L-E-P-H-A-N-T.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>

  <style>
    /* Reset default styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Verdana', sans-serif;
      background-color: #f0f8ff; /* Light blue background */
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
      text-align: center;
      padding: 0 20px;
    }

    /* Header Styling */
    header {
      background-color: #6a5acd; /* Slate blue background */
      padding: 3em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 4em;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-transform: uppercase;
    }

    nav a {
      font-size: 1.2em;
      color: white;
      text-decoration: none;
      background-color: #483d8b;
      padding: 10px 20px;
      border-radius: 12px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #3e2a47;
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 0;
    }

    .learning-content {
      background-color: #fff;
      padding: 40px;
      border-radius: 15px;
      width: 80%;
      max-width: 600px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      background-image: url('https://www.transparenttextures.com/patterns/grass.png');
      background-size: cover;
    }

    .learning-content h2 {
      font-size: 3.5em;
      color: #2f4f4f; /* Dark slate gray */
      margin-bottom: 20px;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    .learning-content p {
      font-size: 1.4em;
      margin: 10px 0;
      line-height: 1.6;
      color: #333;
    }

    .learning-content strong {
      font-size: 1.5em;
      color: #228b22; /* Forest green */
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 10px;
      border: 4px solid #6a5acd;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Footer Styling */
    footer {
      background-color: #6a5acd;
      color: white;
      text-align: center;
      padding: 1em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 2.8em;
      }

      .learning-content h2 {
        font-size: 2.5em;
      }

      .learning-content p {
        font-size: 1.2em;
      }
    }
  </style>
</body>
</html>
