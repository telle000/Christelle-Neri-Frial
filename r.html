<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter R - Rainbow</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment Zone</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background-color: #f7f8fa; /* Light, airy background */
      color: #333; /* Dark text for readability */
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    /* Header Styling */
    header {
      background-color: #ffbb33; /* Bright yellow-orange header for a playful touch */
      padding: 2em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 4em;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    nav a {
      font-size: 1.5em;
      color: white;
      text-decoration: none;
      background-color: #4caf50; /* Green background for navigation */
      padding: 10px 20px;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #45a049; /* Darker green when hovered */
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      width: 80%;
      max-width: 700px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      background-image: linear-gradient(to bottom right, #ff6f61, #ff9a8b, #ffcc99, #66ccff, #99cc33); /* Rainbow gradient */
      background-size: cover;
    }

    .learning-content h2 {
      font-size: 3.5em;
      color: #fff;
      margin-bottom: 20px;
    }

    .learning-content p {
      font-size: 1.5em;
      margin: 10px 0;
      line-height: 1.6;
      color: #fff;
    }

    .learning-content strong {
      font-size: 1.8em;
      color: #fff;
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 15px;
      border: 4px solid #ff6f61; /* Matching red from the rainbow */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }

    .learning-content img:hover {
      transform: scale(1.1);
    }

    /* Footer Styling */
    footer {
      background-color: #ffbb33; /* Same as header */
      color: white;
      text-align: center;
      padding: 1.5em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 3.2em;
      }

      .learning-content h2 {
        font-size: 2.5em;
      }

      .learning-content p {
        font-size: 1.3em;
      }
    }
  </style>
  <main>
    <section class="learning-content">
      <h2>Letter R</h2>
      <p>The word for R is: <strong>Rainbow</strong></p>
      <img src="images/rainbow.webp" alt="Rainbow" width="200" height="200">
      <p><strong>Rainbow</strong> is spelled as R-A-I-N-B-O-W.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
