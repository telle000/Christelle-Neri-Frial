<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Z - Zebra</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment Zone</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f1f8e9; /* Soft green background to keep it calm */
      color: #333;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    /* Header Styling */
    header {
      background-color: #212121; /* Dark grey for the header to make it stand out */
      padding: 2.5em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 3.5em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    nav a {
      font-size: 1.5em;
      color: white;
      text-decoration: none;
      background-color: #ffeb3b; /* Bright yellow button */
      padding: 10px 20px;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #fbc02d; /* Darker yellow on hover */
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      width: 80%;
      max-width: 700px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      background-color: #ffffff; /* White background for the content */
      text-align: center;
      border: 5px solid #212121; /* Dark grey border */
      background-image: linear-gradient(to right, #ffffff 50%, #f5f5f5 50%); /* Zebra stripes background effect */
      background-size: 30px 30px;
    }

    .learning-content h2 {
      font-size: 3.5em;
      color: #212121; /* Dark grey for the headings */
      margin-bottom: 20px;
    }

    .learning-content p {
      font-size: 1.5em;
      margin: 10px 0;
      line-height: 1.6;
      color: #212121;
    }

    .learning-content strong {
      font-size: 1.8em;
      color: #ff5722; /* Bright orange for emphasis */
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 10px;
      border: 3px solid #212121;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }

    .learning-content img:hover {
      transform: scale(1.1);
    }

    /* Footer Styling */
    footer {
      background-color: #212121;
      color: white;
      text-align: center;
      padding: 1.5em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 3.2em;
      }

      .learning-content h2 {
        font-size: 2.5em;
      }

      .learning-content p {
        font-size: 1.3em;
      }
    }
  </style>
  <main>
    <section class="learning-content">
      <h2>Letter Z</h2>
      <p>The word for Z is: <strong>Zebra</strong></p>
      <img src="zebra.webp" alt="Zebra" width="200" height="200">
      <p><strong>Zebra</strong> is spelled as Z-E-B-R-A.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
