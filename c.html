<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter C - Cow</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
    /* Reset default styling */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Body Styling */
body {
  font-family: 'Verdana', sans-serif;
  background-color: #d2f5d7; /* Soft green background for a calming farm feel */
  color: #444;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  text-align: center;
}

/* Header Styling */
header {
  background-color: #76c7c0; /* Fresh teal color to give a natural, clean look */
  padding: 2em 1em;
  color: white;
  text-align: center;
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
}

header h1 {
  font-size: 3.5em;
  font-family: 'Georgia', serif;
  margin-bottom: 15px;
}

nav a {
  font-size: 1.2em;
  color: white;
  text-decoration: none;
  background-color: #68c1b1;
  padding: 10px 20px;
  border-radius: 10px;
  transition: background-color 0.3s ease, transform 0.3s ease;
}

nav a:hover {
  background-color: #4a9f8f; /* A little darker shade for hover effect */
  transform: scale(1.1);
}

/* Main Content Styling */
main {
  display: flex;
  justify-content: center;
  align-items: center;
  flex: 1;
  padding: 50px 0;
}

.learning-content {
  text-align: center;
  background-color: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
  width: 80%;
  max-width: 600px;
  background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); /* Subtle wooden texture */
  background-size: cover;
}

.learning-content h2 {
  font-size: 2.5em;
  color: #7b9a6f; /* Earthy greenish hue */
  margin-bottom: 15px;
  font-family: 'Georgia', serif;
}

.learning-content p {
  font-size: 1.5em;
  margin: 10px 0;
  line-height: 1.6;
}

.learning-content strong {
  font-size: 1.6em;
  color: #ff6a00; /* Bright orange for emphasis */
}

/* Image Styling */
.learning-content img {
  margin: 20px 0;
  border-radius: 10px;
  border: 4px solid #7b9a6f;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

/* Footer Styling */
footer {
  background-color: #76c7c0;
  color: white;
  text-align: center;
  padding: 1em 0;
  font-size: 1.2em;
  font-style: italic;
  box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
}

footer p {
  margin: 0;
}

/* Responsive Design */
@media (max-width: 768px) {
  header h1 {
    font-size: 2.8em;
  }

  nav a {
    font-size: 1em;
    padding: 8px 16px;
  }

  .learning-content h2 {
    font-size: 2.2em;
  }

  .learning-content p {
    font-size: 1.2em;
  }
}

  </style>
  <main>
    <section class="learning-content">
      <h2>Letter C</h2>
      <p>The word for C is: <strong>Cow</strong></p>
      <img src="images/cow.webp" alt="Cow" width="200" height="200">
      <p><strong>Cow</strong> is spelled as C-O-W.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
