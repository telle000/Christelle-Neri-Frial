<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter D - Dice</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  
  <main>
    <section class="learning-content">
      <h2>Letter D</h2>
      <p>The word for D is: <strong>Dice</strong></p>
      <img src="dice.webp" alt="Dice" width="200" height="200">
      <p><strong>Dice</strong> is spelled as D-I-C-E.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>

  <style>
    /* Reset default styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f7f7f7; /* Light gray background */
      color: #444;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
      text-align: center;
      padding: 0 20px;
    }

    /* Header Styling */
    header {
      background-color: #ffbc00; /* Bright yellow for energy */
      padding: 2em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 3.5em;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    nav a {
      font-size: 1.2em;
      color: white;
      text-decoration: none;
      background-color: #f07f1f;
      padding: 10px 20px;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #e06b19;
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 0;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 12px;
      width: 80%;
      max-width: 650px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
      background-size: cover;
    }

    .learning-content h2 {
      font-size: 3em;
      color: #ff4040; /* Red for emphasis */
      margin-bottom: 20px;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    .learning-content p {
      font-size: 1.5em;
      margin: 10px 0;
      line-height: 1.6;
      color: #444;
    }

    .learning-content strong {
      font-size: 1.6em;
      color: #ff6a00; /* Bright orange for the word 'Dice' */
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 10px;
      border: 4px solid #ffbc00;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Footer Styling */
    footer {
      background-color: #ffbc00;
      color: white;
      text-align: center;
      padding: 1em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 2.8em;
      }

      .learning-content h2 {
        font-size: 2.2em;
      }

      .learning-content p {
        font-size: 1.2em;
      }
    }
  </style>
</body>
</html>
