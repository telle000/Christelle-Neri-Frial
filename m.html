<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter M - Mouse</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f0f0f0; /* Soft gray background */
      color: #333;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    /* Header Styling */
    header {
      background-color: #8e44ad; /* Playful purple */
      padding: 2.5em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 4em;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
    }

    nav a {
      font-size: 1.3em;
      color: white;
      text-decoration: none;
      background-color: #2ecc71; /* Green for contrast */
      padding: 12px 24px;
      border-radius: 15px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #27ae60; /* Darker green on hover */
      transform: scale(1.05);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      width: 80%;
      max-width: 650px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); /* Subtle wood pattern */
      background-size: cover;
    }

    .learning-content h2 {
      font-size: 3.5em;
      color: #8e44ad; /* Playful purple */
      margin-bottom: 20px;
    }

    .learning-content p {
      font-size: 1.5em;
      margin: 10px 0;
      line-height: 1.6;
      color: #555;
    }

    .learning-content strong {
      font-size: 1.6em;
      color: #8e44ad; /* Playful purple for strong text */
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 15px;
      border: 4px solid #8e44ad; /* Border matching the header color */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }

    .learning-content img:hover {
      transform: scale(1.1);
    }

    /* Footer Styling */
    footer {
      background-color: #8e44ad; /* Playful purple */
      color: white;
      text-align: center;
      padding: 1.5em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 2.8em;
      }

      .learning-content h2 {
        font-size: 2.5em;
      }

      .learning-content p {
        font-size: 1.2em;
      }
    }
  </style>
  <main>
    <section class="learning-content">
      <h2>Letter M</h2>
      <p>The word for M is: <strong>Mouse</strong></p>
      <img src="mouse.webp" alt="Mouse" width="200" height="200">
      <p><strong>Mouse</strong> is spelled as  M-O-U-S-E.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
