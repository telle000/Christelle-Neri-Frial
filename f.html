<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter F - Flower</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
     * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f1f6f9; /* Soft light blue */
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    /* Header Styling */
    header {
      background-color: #3a8d99; /* Cool teal */
      padding: 1.5em 0;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 3em;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      letter-spacing: 2px;
    }

    nav a {
      font-size: 1.2em;
      color: white;
      text-decoration: none;
      background-color: #2c6f73; /* Darker teal */
      padding: 10px 20px;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #1f565b;
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 0;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 12px;
      width: 80%;
      max-width: 650px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
      background-size: cover;
    }

    .learning-content h2 {
      font-size: 3em;
      color: #2c6f73; /* Dark teal */
      margin-bottom: 20px;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    .learning-content p {
      font-size: 1.4em;
      margin: 10px 0;
      line-height: 1.6;
      color: #444;
    }

    .learning-content strong {
      font-size: 1.6em;
      color: #8e1c25; /* Bold red-orange for the word 'Elephant' */
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 15px;
      border: 5px solid #3a8d99; /* Matching border to header color */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Footer Styling */
    footer {
      background-color: #3a8d99;
      color: white;
      text-align: center;
      padding: 1em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      
    }
      header h1 {
        font-size: 2.6em;
      }

      .learning-content h2 {
        font-size: 2.2em;
      }

      .learning-content p {
        font-size: 1.1em;
      }
  </style>
  
  <main>
    <section class="learning-content">
      <h2>Letter F</h2>
      <p>The word for F is: <strong>Flower</strong></p>
      <img src="images/flower.webp" alt="Flower" width="200" height="200">
      <p><strong>Flower</strong> is spelled as F-L-O-W-E-R.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
