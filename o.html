<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter O - Orange</title>
</head>
<body>
  <header>
    <h1>Kids Entertainment Zone</h1>
    <nav>
      <a href="abc.html">Back to ABCs</a>
    </nav>
  </header>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background-color: #fff3e0; /* Soft peachy background */
      color: #4e4e4e;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    /* Header Styling */
    header {
      background-color: #ff7043; /* Orange background to match the theme */
      padding: 2em 0;
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 4.5em;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); /* Fun text shadow */
    }

    nav a {
      font-size: 1.3em;
      color: white;
      text-decoration: none;
      background-color: #ffcc80; /* Lighter orange for the button */
      padding: 10px 20px;
      border-radius: 12px;
      transition: background-color 0.3s, transform 0.3s;
    }

    nav a:hover {
      background-color: #ffb74d; /* Hover effect: darker orange */
      transform: scale(1.1);
    }

    /* Main Content Styling */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .learning-content {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      width: 80%;
      max-width: 700px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      background-image: url('https://www.transparenttextures.com/patterns/soft-metal.png'); /* Subtle texture for visual interest */
      background-size: cover;
    }

    .learning-content h2 {
      font-size: 3.5em;
      color: #ff7043; /* Matching orange color */
      margin-bottom: 20px;
    }

    .learning-content p {
      font-size: 1.5em;
      margin: 10px 0;
      line-height: 1.6;
      color: #4e4e4e;
    }

    .learning-content strong {
      font-size: 1.6em;
      color: #ff7043;
    }

    /* Image Styling */
    .learning-content img {
      margin: 20px 0;
      border-radius: 15px;
      border: 4px solid #ff7043;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }

    .learning-content img:hover {
      transform: scale(1.1);
    }

    /* Footer Styling */
    footer {
      background-color: #ff7043; /* Same as header for balance */
      color: white;
      text-align: center;
      padding: 1.5em 0;
      font-size: 1.2em;
      font-style: italic;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 0;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header h1 {
        font-size: 3.2em;
      }

      .learning-content h2 {
        font-size: 2.5em;
      }

      .learning-content p {
        font-size: 1.3em;
      }
    }
  </style>
  <main>
    <section class="learning-content">
      <h2>Letter O</h2>
      <p>The word for O is: <strong>Orange</strong></p>
      <img src="orange.webp" alt="Orange" width="200" height="200">
      <p><strong>Orange</strong> is spelled as O-R-A-N-G-E.</p>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Kids Entertainment</p>
  </footer>
</body>
</html>
